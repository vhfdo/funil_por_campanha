<script>
// ⚠️ O TOKEN DO PIPEDRIVE NÃO FICA MAIS AQUI. Todas as chamadas passam pelo
// proxy serverless em /api/pipedrive, que injeta o PIPEDRIVE_TOKEN no servidor.

// --- Gate de sessão: sem login válido, não entra ---
const SESSION_TOKEN = sessionStorage.getItem('funil_token');
if (!SESSION_TOKEN) {
  window.location.href = '/login.html';
}
document.getElementById('userInfo').textContent = sessionStorage.getItem('funil_user') || '';

function logout() {
  flushEvents(true);
  sessionStorage.removeItem('funil_token');
  sessionStorage.removeItem('funil_user');
  window.location.href = '/login.html';
}

// --- Rastreamento de uso: fila local + envio em lote ---
let eventQueue = [];

function logEvent(type, details = {}) {
  eventQueue.push({ type, details, timestamp: new Date().toISOString() });
  if (eventQueue.length >= 20) flushEvents();
}

function flushEvents(isUnloading = false) {
  if (!eventQueue.length) return;
  const batch = eventQueue.splice(0, eventQueue.length);
  const payload = JSON.stringify({ events: batch });

  fetch('/api/track', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${SESSION_TOKEN}` },
    body: payload,
    keepalive: isUnloading, // garante que a requisição sobrevive mesmo se a aba fechar
  }).catch(() => { /* perder log de clique não deve travar o app */ });
}

setInterval(() => flushEvents(), 20000);
window.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') flushEvents(true); });
window.addEventListener('pagehide', () => flushEvents(true));

logEvent('page_view');

const FILTER_MOV  = 1669190;
const CARGO_KEY   = "718c8aba81211c883ffd9f4616f75ee22a10b2da";
const APLIC_KEY   = "23de049432e523993f69ecd456a3f755c0f07f3d";
const UTM_KEY     = "ae03fa460a108b8cdfa87e97ebca24379d2779d6";
const UTM_SRC_KEY = "8fb3221ab3d91cddaf51e0a9e1bbcda34fc9d28e";

const GOOGLE_IDS = new Set(["22822740395","23869952762","22675029313","23874401647","23397388987","22508119133","23963147748"]);
const PALAVRAS_MQL = ["diretor","director","founder","fundador","propr","socio","sócio","partner","owner","empresario","empresário","ceo","chief","president","consultor","consultant","profissional liberal","vice","c-level","vp","cfo","coo","cto","cmo","conselh","advisor","manager","gerente","coordenador","head","entrepreneur","executive"];

const STAGE_LEVEL = {"aplicação":1,"aplicacao":1,"contatado":2,"etapa 1":3,"etapa 2":4,"etapa 3":5,"oportunidade":3,"reabertura":2,"agendados":6,"no show":6,"validação de reunião":7,"validacao de reuniao":7,"negociação":8,"negociacao":8,"inscrição em andamento":9,"inscricao em andamento":9};
const MESES_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

function normalizeText(s) {
  return (s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

// Ordem fixa do funil, conforme pedido — "Aplicação" é o próprio MQL entrando,
// as demais são etapas reais do Pipedrive (comparadas de forma normalizada).
const FUNNEL_STAGES = [
  { key: 'aplicacao',              label: 'Aplicação',              prop: 'aplicacao' },
  { key: 'etapa 1',                label: 'Etapa 1',                prop: 'etapa1' },
  { key: 'etapa 2',                label: 'Etapa 2',                prop: 'etapa2' },
  { key: 'etapa 3',                label: 'Etapa 3',                prop: 'etapa3' },
  { key: 'contatado',              label: 'Contatado',              prop: 'contatado' },
  { key: 'oportunidade',           label: 'Oportunidade',           prop: 'oportunidade' },
  { key: 'agendados',              label: 'Agendados',              prop: 'agendados' },
  { key: 'no show',                label: 'No Show',                prop: 'noshow' },
  { key: 'validacao de reuniao',   label: 'Validação de Reunião',   prop: 'validacao' },
  { key: 'negociacao',             label: 'Negociação',             prop: 'negociacao' },
  { key: 'inscricao em andamento', label: 'Inscrição em Andamento', prop: 'inscricao' },
];

function stageFunnelKey(stageName) {
  const n = normalizeText(stageName);
  const found = FUNNEL_STAGES.find(f => f.key !== 'aplicacao' && n.includes(f.key));
  return found ? found.key : null;
}

let funilGlobalCounts = {};
let campanhaPorKey = {};
let escopoFunilAtivo = null; // null = agregado; senão, key da campanha

let stagesMap = {}, dadosCamp = [], filtroAtivo = 'todos', sortCol = 'total', sortAsc = false, chartInst = null, funilChartInst = null;

function montarCabecalhoTabela() {
  const tr = document.getElementById('tableHeadRow');
  const colunas = [
    { label: 'Campanha', sortKey: 'nome', num: false },
    { label: 'MQLs', sortKey: 'total', num: true },
    ...FUNNEL_STAGES.filter(f => f.key !== 'aplicacao').map(f => ({ label: f.label, sortKey: f.prop, num: true })),
    { label: 'Descarte', sortKey: 'perdido', num: true },
  ];
  tr.innerHTML = colunas.map(c =>
    `<th${c.num ? ' class="num"' : ''} onclick="sortBy('${c.sortKey}')">${c.label}${c.num || c.sortKey==='nome' ? ' ↕' : ''}</th>`
  ).join('');
}
window.addEventListener('DOMContentLoaded', montarCabecalhoTabela);

function getPeriodo() {
  const ini = document.getElementById('dataInicio').value;
  const fim = document.getElementById('dataFim').value;
  if (!ini || !fim) { alert('Selecione a data de início e a data de fim!'); return null; }

  const datas = [];
  const d = new Date(ini + 'T00:00:00');
  const fimDate = new Date(fim + 'T00:00:00');
  while (d <= fimDate) {
    const dia = String(d.getDate()).padStart(2,'0');
    const mes = String(d.getMonth()+1).padStart(2,'0');
    const ano = d.getFullYear();
    datas.push({ diaStr: `${dia}/${mes}/${ano}`, diaIso: `${ano}-${mes}-${dia}`, mesStr: `${mes}/${ano}` });
    d.setDate(d.getDate() + 1);
  }

  const label = `${ini.split('-').reverse().join('/')} → ${fim.split('-').reverse().join('/')}`;
  return { datas, label, iniIso: ini, fimIso: fim };
}

function stageLevel(name) {
  const n = (name||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  for (const [k,v] of Object.entries(STAGE_LEVEL)) {
    if (n.includes(k.normalize('NFD').replace(/[\u0300-\u036f]/g,''))) return v;
  }
  return 0;
}

function isMQL(cargo) {
  if (!cargo) return false;
  return PALAVRAS_MQL.some(p => cargo.toLowerCase().includes(p));
}
function isCampanhaValida(utm) {
  if (!utm) return false;
  utm = utm.trim();
  if (GOOGLE_IDS.has(utm)) return true;
  if (utm.toUpperCase().includes("PFCC")) return true;
  return false;
}
function getCanal(utm) {
  if (!utm) return 'outros';
  if (GOOGLE_IDS.has(utm.trim())) return 'google';
  const u = utm.toUpperCase();
  if (u.includes('META')) return 'meta';
  if (u.includes('LKDN')||u.includes('LINKEDIN')||u.includes('LICKS')) return 'linkedin';
  return 'outros';
}
function normCamp(utm) {
  if (!utm) return 'Sem UTM';
  utm = utm.trim();
  if (GOOGLE_IDS.has(utm)) return utm;
  return utm.length > 55 ? utm.substring(0,55)+'…' : utm;
}
function converterBR(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts.replace(' ','T')+'Z');
    d.setHours(d.getHours()-3);
    return d.toISOString().substring(0,10);
  } catch { return ts.substring(0,10); }
}

function setProgress(pct, label, sub) {
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = label;
  if (sub!==undefined) document.getElementById('progressSub').textContent = sub;
}

// ---- Chamadas agora vão todas pro proxy /api/pipedrive ----
// path = endpoint do Pipedrive (ex: "deals", "stages", "deals/123/changelog")
// params = objeto com os demais query params (sem api_token — o proxy cuida disso)

async function pdFetch(path, params = {}) {
  const qs = new URLSearchParams(params);
  const r = await fetch(`/api/pipedrive?path=${encodeURIComponent(path)}&${qs.toString()}`, {
    headers: { Authorization: `Bearer ${SESSION_TOKEN}` }
  });
  if (r.status === 401) {
    logout();
    throw new Error('Sessão expirada. Faça login novamente.');
  }
  return r.json();
}

async function fetchAll(path, baseParams = {}) {
  let items=[], start=0;
  while(true){
    const d = await pdFetch(path, {...baseParams, start, limit:500});
    if(!d.data) break;
    items = items.concat(d.data);
    if(!d.additional_data?.pagination?.more_items_in_collection) break;
    start+=500;
  }
  return items;
}

async function getChangelog(dealId, mesIso) {
  const entradas=[];
  let cursor=null;
  while(true){
    const params = { limit: 100 };
    if (cursor) params.cursor = cursor;
    let res;
    try{ res = await pdFetch(`deals/${dealId}/changelog`, params); }catch{ break; }
    for(const item of (res.data||[])){
      if(item.field_key==='stage_id'&&item.new_value){
        const dia=converterBR(item.time||'');
        if(dia.startsWith(mesIso)) entradas.push({stageId:parseInt(item.new_value),dia});
      }
    }
    cursor=res.additional_data?.next_cursor;
    if(!cursor) break;
  }
  return entradas;
}

function setFiltro(f, btn) {
  filtroAtivo=f;
  logEvent('filtro_canal', { canal: f });
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTabela();
  renderChart();
}

function sortBy(col) {
  if(sortCol===col) sortAsc=!sortAsc;
  else{sortCol=col;sortAsc=false;}
  logEvent('ordenar_tabela', { coluna: col, ascendente: sortAsc });
  renderTabela();
}

function calcTx(n,t){ return t?Math.round(n/t*1000)/10:0; }

function rateBar(v, inverse=false) {
  const good = inverse ? v<=30 : v>=50;
  const mid  = inverse ? v<=60 : v>=25;
  const color = good?'#4a9eed':mid?'#8ab8dd':'#c0392b';
  const cls   = good?'c-green':mid?'c-mid':'c-red';
  return `<div class="rate-cell"><div class="rate-bar"><div class="rate-fill" style="width:${Math.min(v,100)}%;background:${color}"></div></div><span class="rate-val ${cls}">${v}%</span></div>`;
}

function tagCanal(canal) {
  const m={google:['tag-google','G'],meta:['tag-meta','M'],linkedin:['tag-linkedin','Li']};
  const [cls,label]=(m[canal]||['','']);
  return cls?`<span class="camp-tag ${cls}">${label}</span>`:'';
}

function dadosFiltrados() {
  let d = filtroAtivo==='todos'?dadosCamp:dadosCamp.filter(x=>x.canal===filtroAtivo);
  return d.sort((a,b)=>{
    const va=a[sortCol]??a.total;
    const vb=b[sortCol]??b.total;
    return sortAsc?va-vb:vb-va;
  });
}

function toggleDeals(utmKey) {
  const campRow   = document.getElementById('camp-'+utmKey);
  const dealsRow  = document.getElementById('deals-'+utmKey);
  if(!campRow||!dealsRow) return;
  const abrindo = !campRow.classList.contains('open');
  logEvent('expandir_campanha', { campanha_key: utmKey, abrindo });
  campRow.classList.toggle('open');
  dealsRow.classList.toggle('open');
  escopoFunilAtivo = utmKey;
  renderFunil(utmKey);
}

function resetFunil() {
  escopoFunilAtivo = null;
  logEvent('resetar_funil');
  renderFunil(null);
}

function renderFunil(scopeKey) {
  let counts, titulo;
  if (!scopeKey || !campanhaPorKey[scopeKey]) {
    counts = funilGlobalCounts;
    titulo = 'Todas as campanhas';
    document.getElementById('btnResetFunil').classList.remove('show');
  } else {
    const c = campanhaPorKey[scopeKey];
    counts = c.funilCounts;
    titulo = c.nome;
    document.getElementById('btnResetFunil').classList.add('show');
  }
  document.getElementById('funilEscopo').textContent = titulo;

  const labels = FUNNEL_STAGES.map(f => f.label);
  const data = FUNNEL_STAGES.map(f => counts[f.key] || 0);
  const paleta = ['#4a9eed','#459be0','#4098d4','#3b95c8','#3792bd','#328fb1','#2e8ba6','#29889a','#25858f','#208284','#1c7f78'];

  if (funilChartInst) funilChartInst.destroy();
  funilChartInst = new Chart(document.getElementById('chartFunil'), {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: paleta, borderWidth: 0, borderRadius: 2 }] },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => ` ${ctx.raw.toLocaleString('pt-BR')} negócios` },
          backgroundColor: '#1a1a1a', borderColor: '#222', borderWidth: 1,
          titleFont: { family: 'DM Mono' }, bodyFont: { family: 'DM Mono' }
        }
      },
      scales: {
        x: { ticks: { color: '#666', font: { family: 'DM Mono', size: 10 } }, grid: { color: '#1a1a1a' }, beginAtZero: true },
        y: { ticks: { color: '#999', font: { family: 'DM Mono', size: 11 } }, grid: { display: false } }
      }
    }
  });
}

function renderTabela() {
  const tbody = document.getElementById('tabelaBody');
  const dados = dadosFiltrados();
  const TOTAL_COLS = 2 + FUNNEL_STAGES.length; // Campanha + MQLs + (11 etapas, sem contar aplicação já=MQLs) + Descarte
  if(!dados.length){ tbody.innerHTML=`<tr><td colspan="${TOTAL_COLS}" class="empty">Nenhuma campanha encontrada.</td></tr>`; return; }

  tbody.innerHTML = dados.flatMap(c => {
    const key = btoa(c.utm).replace(/[^a-z0-9]/gi,'').substring(0,20);
    campanhaPorKey[key] = c;
    const dealsHtml = c.dealIds.map(id => {
      const nomeEscapado = JSON.stringify(c.nome).replace(/"/g, '&quot;');
      return `<a class="deal-link" href="https://boardacademy.pipedrive.com/deal/${id}" target="_blank" onclick="logEvent('clicar_deal', {deal_id: ${id}, campanha: ${nomeEscapado}})">${id}</a>`;
    }).join('');

    const stageCells = FUNNEL_STAGES
      .filter(f => f.key !== 'aplicacao')
      .map(f => `<td class="num">${(c.funilCounts[f.key] || 0).toLocaleString('pt-BR')}</td>`)
      .join('');

    return [
      `<tr class="camp-row" id="camp-${key}" onclick="toggleDeals('${key}')">
        <td class="camp-name"><span class="expand-arrow">▶</span>${c.nome}${tagCanal(c.canal)}</td>
        <td class="num" style="color:var(--blue);font-size:15px;font-weight:700">${c.total.toLocaleString('pt-BR')}</td>
        ${stageCells}
        <td class="num" style="color:var(--red)">${(c.perdido||0).toLocaleString('pt-BR')}</td>
      </tr>`,
      `<tr class="deals-row" id="deals-${key}">
        <td colspan="${TOTAL_COLS}">
          <div class="deals-label">Negócios (${c.dealIds.length}) — clique para abrir no Pipedrive</div>
          <div class="deals-grid">${dealsHtml}</div>
        </td>
      </tr>`
    ];
  }).join('');
}

function renderChart() {
  const dados = dadosFiltrados().slice(0,12);
  const labels = dados.map(d=>d.nome.length>20?d.nome.substring(0,20)+'…':d.nome);
  if(chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('chartCamp'),{
    type:'bar',
    data:{labels,datasets:[{data:dados.map(d=>d.total),backgroundColor:dados.map(d=>d.canal==='google'?'#2980b9':d.canal==='meta'?'#4a6dd4':d.canal==='linkedin'?'#0e76a8':'#4a9eed'),borderWidth:0,borderRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw} MQLs`},backgroundColor:'#1a1a1a',borderColor:'#222',borderWidth:1,titleFont:{family:'DM Mono'},bodyFont:{family:'DM Mono'}}},scales:{x:{ticks:{color:'#666',font:{family:'DM Mono',size:10}},grid:{color:'#1a1a1a'}},y:{ticks:{color:'#666',font:{family:'DM Mono',size:10}},grid:{color:'#1c1c1c'}}}}
  });
}

async function atualizar() {
  const btn=document.getElementById('btnAtualizar');
  btn.disabled=true; btn.textContent='Carregando…';
  document.getElementById('progressWrap').style.display='block';
  document.getElementById('statusBar').textContent='';

  try{
    const periodo = getPeriodo();
    if (!periodo) { btn.disabled=false; btn.textContent='⟳ Atualizar'; document.getElementById('progressWrap').style.display='none'; return; }
    const {datas, label} = periodo;
    logEvent('clicar_atualizar', { periodo: label });
    setProgress(5,'Carregando etapas...','');
    stagesMap={};
    for(const pid of [87,88,46]){
      const d = await pdFetch('stages', { pipeline_id: pid });
      (d.data||[]).forEach(s=>stagesMap[s.id]=s.name);
    }

    setProgress(15,'Carregando deals de movimentação...','');
    const deals=await fetchAll('deals', { filter_id: FILTER_MOV });
    setProgress(30,`${deals.length} deals. Filtrando candidatos...`,'');

    const candidatos=deals.filter(d=>{
      const utm=(d[UTM_KEY]||'').trim();
      const cargo=d[CARGO_KEY]||'';
      const aplic=d[APLIC_KEY]||'';
      const src=(d[UTM_SRC_KEY]||'').toLowerCase();
      return isMQL(cargo)
        && isCampanhaValida(utm)
        && !utm.toLowerCase().includes('workshop')
        && utm.toLowerCase()!=='org'
        && src!=='org'
        && datas.some(d => aplic.includes(d.diaStr));
    });

    setProgress(35,`${candidatos.length} candidatos. Buscando changelog...`,'0 / '+candidatos.length);

    const campMap={};
    const funilGlobalCounts_ = {};
    FUNNEL_STAGES.forEach(f => funilGlobalCounts_[f.key] = 0);

    for(let i=0;i<candidatos.length;i++){
      const deal=candidatos[i];
      const utm=(deal[UTM_KEY]||'').trim();
      const nome=normCamp(utm);
      const canal=getCanal(utm);

      if(!campMap[utm]) {
        campMap[utm]={nome,canal,utm,total:0,conexao:0,agendamento:0,vr:0,ganho:0,perdido:0,dealIds:[]};
        campMap[utm].funilCounts = {};
        FUNNEL_STAGES.forEach(f => campMap[utm].funilCounts[f.key] = 0);
      }
      const c=campMap[utm];
      if(c.dealIds.includes(deal.id)) continue;
      c.dealIds.push(deal.id);
      c.total++;

      // Aplicação: 1 por deal candidato (dedupe por deal, igual ao "candidatos_mes" do Python)
      c.funilCounts['aplicacao']++;
      funilGlobalCounts_['aplicacao']++;

      if(deal.status==='won'){c.ganho++;c.conexao++;c.agendamento++;c.vr++;}
      else if(deal.status==='lost'){c.perdido++;}

      const mesesUnicos = [...new Set(datas.map(d=>d.diaIso.substring(0,7)))];
      let entradas = [];
      for (const mesIsoLoop of mesesUnicos) {
        const e = await getChangelog(deal.id, mesIsoLoop);
        entradas = entradas.concat(e);
      }
      const diasValidos = new Set(datas.map(d=>d.diaIso));
      const entradasFiltradas = entradas.filter(e => diasValidos.has(e.dia));

      // ── Réplica exata do funil_brasil_changelog.py ──
      // Pra cada DIA, considera só a PRIMEIRA mudança de etapa daquele dia
      // (não importa qual etapa) — é assim que o script Python monta
      // entradas_por_dia[dia][deal_id], e depois soma isso linha a linha
      // no DEALS-FUNIL. Se o deal mudar de etapa mais de uma vez no MESMO
      // dia, só a primeira conta; se mudar em dias DIFERENTES dentro do
      // período, cada dia conta separado (por isso pode "duplicar" o deal
      // se ele passou pela mesma etapa em dois dias diferentes).
      const primeiroPorDia = {};
      for (const e of entradasFiltradas) {
        if (!(e.dia in primeiroPorDia)) primeiroPorDia[e.dia] = e.stageId;
      }
      for (const dia in primeiroPorDia) {
        const sn = stagesMap[primeiroPorDia[dia]] || '';
        const fKey = stageFunnelKey(sn);
        if (fKey) {
          c.funilCounts[fKey]++;
          funilGlobalCounts_[fKey]++;
        }
      }

      // Mantido à parte — usado só pra conexao/agendamento/vr (não exibidos
      // na tabela/funil, mas ainda calculados internamente)
      let maxLevel=0, passoiContatado=false;
      for(const e of entradasFiltradas){
        const sn=stagesMap[e.stageId]||'';
        const lvl=stageLevel(sn);
        if(lvl>maxLevel) maxLevel=lvl;
        if(sn.toLowerCase().includes('contatado')) passoiContatado=true;
      }
      if(passoiContatado) c.conexao++;
      if(maxLevel>=6) c.agendamento++;
      if(maxLevel>=7) c.vr++;

      const pct=Math.round(((i+1)/candidatos.length)*65)+35;
      setProgress(pct,`Changelog: ${i+1} / ${candidatos.length}`,nome.substring(0,40));
    }

    funilGlobalCounts = funilGlobalCounts_;

    dadosCamp=Object.values(campMap).map(c=>{
      const stageProps = {};
      FUNNEL_STAGES.forEach(f => stageProps[f.prop] = c.funilCounts[f.key]);
      return {
        ...c,
        ...stageProps,
        funilCounts: c.funilCounts,
        txConexao:calcTx(c.conexao,c.total),
        txAgendamento:calcTx(c.agendamento,c.total),
        txVR:calcTx(c.vr,c.total),
        txConversao:calcTx(c.ganho,c.total),
        txDescarte:calcTx(c.perdido,c.total),
      };
    }).sort((a,b)=>b.total-a.total);

    setProgress(100,'Concluído!','');
    setTimeout(()=>{document.getElementById('progressWrap').style.display='none';},1500);

    escopoFunilAtivo = null;
    renderTabela();
    renderChart();
    renderFunil(null);

    document.getElementById('statusBar').textContent=`✅ ${dadosCamp.length} campanhas | ${candidatos.length} MQLs | ${label} | via changelog`;
    logEvent('atualizacao_concluida', { campanhas: dadosCamp.length, mqls: candidatos.length, periodo: label });

  }catch(e){
    document.getElementById('statusBar').textContent=`❌ Erro: ${e.message}`;
    console.error(e);
  }finally{
    btn.disabled=false; btn.textContent='⟳ Atualizar';
  }
}
</script>
